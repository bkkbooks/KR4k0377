body:
  text: 田融趙書石勒與汲桑往來汲桑清河具邱人年二十餘力扛百鈞呼聞數里時人服之御覽三百八十六汲桑自號大將軍以勒為前驅攻鄴入之南擊充州為苟晞所敗桑走死汲桑六月盛暑而垂重裘累茵使十餘人扇之扇者悉罷桑恚不得清涼斬扇者時軍中為之謠曰奴為將軍何可羞六月重茵被狐裘不識寒暑斷人頭類聚十九書鈔百二十九御覽二十一石勒與劉零等攻魏郡劉零陽平人年二十餘常廝役於縣力制奔牛走及馳馬御覽三百八十六石勒屯葛陂值天雨不息勒長史刁應勸勒降晉勒愀然而嘯張賓勸勒還北勒欣然攘臂曰賓計是也應宜斬明其性怯可退為將軍御覽三百九十二又四百九十九石勒十四年五月飛蝗穿地而生二十日化蠶七八月引作蚖蚖飛周遍河朔百草無遺唯不食三豆及麻開元占經百一十類聚一百後石率精騎五千襲邵續一戰生擒續於青邱鉗頸拲手於襄國青陽城門頓首稱囚御覽六百四十四前石召構殿巧手三千人發陽平等十郡車牛五千乘運土築建德殿臺取土城西南墎內得圓石狀若水碓其銘曰律權石重四鈞上有文曰同律度量衡有辛氏所造議者未之詳或以為瑞參軍續咸曰王莽時物書鈔百十二御覽十六又五十一一百七十五黎陽民陳武妻產三男一女勒賜乳母穀帛以為休詳御覽二百一十一國豐市五日一市御覽八百二十七前石數出遊獵每亟馳騁主簿程琅諫前石屎逐自若草間有瓦木馳馬觸之馬即死前石亦危殆體小不穩還宮歎曰程琅忠臣也不用其言吾之不善追之何及御覽四百五十四按惟此明標田融趙書餘祇稱趙書未標名劉曜攻石勒將戰曜飲乘醉乘大赤馬無故蹢躅不可近於是退赤馬及合陣敗走曜體素壯馬小不勝陷冰為石堪所擒也御覽六十八佛圖澄亦謂必擒劉曜前石有佛圖澄號曰大和尚常乘板輦於大水上書鈔百四十太和二年正月具禮樂朝群后侍郎邵恭執麾不降常侍畦洪執義不彈皆下理官書鈔百二十石虎等破劉曜子熙於上邽獲馬二百疋赤罽金銀步叉弓鞬三十具書鈔百二十六御覽三百五十裴憲撰三正東耕儀書鈔百二十七又百二十九東耕儀直殿中監鋪席於侍臣之南北面解匣出御耒跪授黃門侍中侍中釋劍擎跽以穎授尊太常讚曰皇帝親耕藉田一推一反三推三反成禮侍中跽取耒與侍郎以授殿中監監復韜匣御覽八百二十二中書令徐光秦請以東耕儀親耕改服宜服介幘青縑袴褶書鈔百二十七又百三十九御覽六百九十五又八百十八徐光字秀武頓邱人父以牛醫為業光年十四五為將軍王陽秣馬光但書馬柳屋柱為詩頌不親馬事類聚五十六御覽皇后出蠶乘羽蓋金華車書鈔百四十前石時暴風雷雨霹靂震臺壤署婦人震死瘞之三日重霹靂出之御覽八百七十六石勒時斷寒食忽暴風霹雷雨雹大者如彈丸平地水深三尺勒大驚復令民寒食如故書鈔百四十三前石臨安縣馬生角在耳長有七寸搖之則動占經百十八前石時安定太守邵琨上言蛇與鼠鬭於門中而蛇自死同上一百二十前石時淳觚白羌婦人產卵大如盂剖之有蟲如巨蟻二足立行御覽九百四十四前石時有石隕魏郡鄴縣東北六十里間罷地初有黑黃雲如幕長數十疋交酉聲如雷霹靂墮地熱氣起連天時有左右有私鋤者皆震疊塵止經視之上猶帶熱求覓見有一石方一尺青色而輕撓之音若落二十一日前石死占經七十六前石死調大臣子弟六十人為挽郎引錦一疋御覽八百十五王洛生石勒欲挫其權豪洛生在獄自刺腹深五寸洛生肥盛不陷中重以刀潰其腹出胃而死御覽百七十八石肇前石之昆弟也前石既貴肇在軍中不能自達人送詣前石前石哀之拜建威將軍以肇㒇才尸每高選參佐輔之為聘廣川劉典女肇甚懼之拜長樂太守治官每入門動稱阿劉可爾不可爾時人以為嗤謠御覽四百九十九石勒參軍周延為館陶令盜官絹數百疋下獄以八座議宥之後每設大會使與俳兒著介幘黃絹單衣優問延曰汝為何官在我俳中答曰我本為館陶令計二十數單衣曰政坐取是故入汝俳中以為大笑類聚八十五書鈔百十二御覽五百六十九又六百九十一石勒使王述煮鹽於角飛水經注九按此引作趙記石虎字季龍勒從弟也征伐每斬將搴旗勒死誅勒諸兒襲位世說注二將軍張珍飲郡縣民丁萬人徙洛陽六鐘鐘簴九龍翁仲銅駞飛廉鐘一沒盟津中御覽五百七十五石虎造庭燎於橦末高十丈上盤置燎下盤安人以待燎絙繳上下類聚八十御覽八百七十石虎聘崔氏為夫人無寵所愛鄭夫人有百日女病謂崔誤與藥以告後石虎作威問之崔言外合見小子以少唾其容作祟非藥也後石乃射之一箭通中而死御覽三百八十七從幽州大道滹沱河造浮橋植行榆五十里置行宮類聚八十八御覽九百五十六臨元侯崔約字道恭與太子詹事羯孫珍朝會珍患目痛問約用何方治為佳約戲言唯溺取愈珍曰目何可溺約曰卿目睕睕正可溺中珍入秦天子怒約父子伏誅御覽六百四十五後石造獵車千轅長三尺御覽七百七十五石虎子韜以琉璃爵螺杯勸客酒御覽七百六十石虎建武十四年東南卒有雲黑筲分為三疋又貫日日沒後分為七枚相去數十丈其間有白雲如魚鱗虎子韜曰當有刺客後果為太子宣所殺御覽八百七十七前石有佛圖澄號曰大和尚道法大行建武末卒葬於鄴西紫陌先造生墓已數年矣書鈔九十二御覽百九十五宣咸卒後五年石虎夢見咸涕泗囑其子奮虎曰非心慮所達也通夢之言信而有徵奮今何在左右對曰為趙郡守於是握廷尉為太常才力不及父因咸夢而登列卿也太平廣記二百七十六冉閔攻石遵遵方與女子彈碁兵至殺之御覽七百五十四燕人龐世為光祿勳秦案豪強苛剋人物咸懼疾之及卒門無弔客時人為之謠曰龐家之巷車馬鱗鱗泥丸之日門無弔賓弔賓不來何所因由性苛剋寡所親御覽百四六十五
